name: Fetch Issues

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch issues from GitHub
        id: fetch
        run: node scripts/fetch-issues.js
        env:
          ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        continue-on-error: true  # exit code 1 = no changes (not a failure)

      - name: Commit and push if data changed
        if: steps.fetch.outcome == 'success'  # only if exit code 0 (data changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/issues.json
          git commit -m "chore: refresh issues data"
          git push
